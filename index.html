<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador de Navios - ETA Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .input-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 2px dashed #2a5298;
        }

        .input-section h2 {
            color: #1e3c72;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #2a5298;
        }

        .example {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 0.9em;
            color: #1565c0;
            font-family: monospace;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #fff;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .status {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            font-weight: 500;
            display: none;
        }

        .status.info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #2196f3;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .status.loading {
            background: #fff3e0;
            color: #ef6c00;
            border-left: 4px solid #ff9800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #ff9800;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .contracts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .contract-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .contract-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .contract-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .contract-number {
            font-weight: bold;
            color: #667eea;
            font-size: 1.2em;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-waiting { background: #fff3e0; color: #ef6c00; }
        .status-searching { background: #e3f2fd; color: #1565c0; }
        .status-found { background: #e8f5e9; color: #2e7d32; }
        .status-error { background: #ffebee; color: #c62828; }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .info-label {
            color: #666;
            font-weight: 500;
        }

        .info-value {
            color: #333;
            font-weight: bold;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }

        .ship-name {
            font-size: 1.3em;
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .eta-highlight {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            text-align: center;
        }

        .eta-label {
            font-size: 0.9em;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .eta-value {
            font-size: 1.8em;
            font-weight: bold;
            margin-top: 5px;
        }

        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .connection-status.online { background: #4caf50; color: white; }
        .connection-status.offline { background: #f44336; color: white; }
        .connection-status.connecting { background: #ff9800; color: white; }

        .pulse {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .debug-info {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 0.8em;
            color: #666;
            font-family: monospace;
            word-break: break-all;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .contracts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="connection-status offline" id="connStatus">
        <span class="pulse"></span>
        <span id="connText">Offline</span>
    </div>

    <div class="container">
        <h1>🚢 Rastreador de Navios</h1>
        <p class="subtitle">Sistema de Monitoramento de ETA</p>

        <div class="input-section">
            <h2>📋 Input de Dados</h2>
            <textarea id="dataInput" placeholder="Cole aqui os dados do Excel...
Exemplo:
241ISZ2528034MSCMSDU9826591MSC LUDOVICA
SSZ1738224CMA CGMCGMU5105732SWANSEA"></textarea>
            
            <div class="example">
                <strong>Formato:</strong> BOOKING + ARMADOR + CONTAINER(11 chars) + NAVIO
            </div>

            <div class="btn-container">
                <button class="btn-primary" id="btnProcess" onclick="processData()">
                    🔍 Buscar Informações
                </button>
                <button class="btn-secondary" onclick="clearAll()">🗑️ Limpar</button>
                <button class="btn-secondary" onclick="loadExample()">📋 Exemplo</button>
            </div>

            <div id="statusMessage" class="status"></div>
        </div>

        <div id="resultsSection" style="display: none;">
            <h2>🚢 Resultados do Rastreamento</h2>
            <div class="contracts-grid" id="contractsGrid"></div>
        </div>

        <div style="text-align: center; padding: 60px 20px; color: #666;" id="emptyState">
            <div style="font-size: 4em; margin-bottom: 20px;">🚢</div>
            <h3>Nenhum dado processado ainda</h3>
            <p>Cole os dados do Excel e clique em "Buscar Informações" para começar</p>
        </div>
    </div>

    <script>
        // Lista de armadores conhecidos
        const ARMADORES = [
            'HAPAG LLOYD', 'CMA CGM', 'MSC', 'COSCO', 'HMM', 'PIL', 'MAERSK', 
            'ONE', 'EVERGREEN', 'YANG MING', 'HYUNDAI', 'ZIM', 'OOCL', 'APL',
            'HAMBURG SUD', 'HAPAG', 'LLOYD', 'UASC', 'CSAV', 'CCNI', 'K LINE',
            'MOL', 'NYK', 'SAFMARINE', 'SEALAND'
        ];

        let contracts = [];

        // Detectar URL automaticamente (mesmo domínio)
        const BACKEND_URL = window.location.origin;

        // Testar conexão ao carregar
        window.onload = async function() {
            await testConnection();
        };

        async function testConnection() {
            updateConnectionStatus('connecting', 'Testando...');
            
            try {
                const response = await fetch(`${BACKEND_URL}/health`);
                if (response.ok) {
                    updateConnectionStatus('online', 'Conectado');
                } else {
                    throw new Error('Health check failed');
                }
            } catch (error) {
                updateConnectionStatus('offline', 'Erro de conexão');
                console.error('Erro ao conectar:', error);
            }
        }

        function updateConnectionStatus(status, text) {
            const el = document.getElementById('connStatus');
            el.className = `connection-status ${status}`;
            document.getElementById('connText').textContent = text;
        }

        function findContainer(str) {
            const regex = /[A-Z]{4}\d{7}/;
            const match = str.match(regex);
            return match ? { container: match[0], index: match.index } : null;
        }

        function findArmador(str) {
            const upperStr = str.toUpperCase();
            const sorted = [...ARMADORES].sort((a, b) => b.length - a.length);
            
            for (let armador of sorted) {
                const idx = upperStr.indexOf(armador);
                if (idx !== -1) {
                    return { armador, index: idx, endIndex: idx + armador.length };
                }
            }
            return null;
        }

        function parseInputData(input) {
            const lines = input.trim().split('\n');
            const parsed = [];
            
            for (let line of lines) {
                line = line.trim();
                if (line.length < 20) continue;
                
                const containerInfo = findContainer(line);
                if (!containerInfo) continue;
                
                const container = containerInfo.container;
                const containerStart = containerInfo.index;
                
                const armadorInfo = findArmador(line);
                let armador = 'N/A';
                
                if (armadorInfo) {
                    armador = armadorInfo.armador;
                }
                
                let booking = '';
                let navio = '';
                
                if (armadorInfo && armadorInfo.index < containerStart) {
                    booking = line.substring(0, armadorInfo.index).trim();
                    navio = line.substring(containerStart + 11).trim();
                } else {
                    booking = line.substring(0, containerStart).trim();
                    if (armadorInfo && booking.includes(armador)) {
                        booking = booking.replace(armador, '').trim();
                    }
                    navio = line.substring(containerStart + 11).trim();
                }
                
                if (!booking && armadorInfo) {
                    booking = line.substring(0, armadorInfo.index).trim();
                }
                
                if (booking && container && navio) {
                    parsed.push({
                        id: 'CTR-' + (parsed.length + 1).toString().padStart(3, '0'),
                        booking,
                        armador,
                        container,
                        navio,
                        searchName: navio.toUpperCase()
                    });
                }
            }
            
            return parsed;
        }

        async function processData() {
            const input = document.getElementById('dataInput').value;
            const btn = document.getElementById('btnProcess');
            
            if (!input.trim()) {
                showStatus('Cole os dados do Excel primeiro!', 'error');
                return;
            }

            btn.disabled = true;
            contracts = parseInputData(input);
            
            if (contracts.length === 0) {
                showStatus('Nenhum contrato válido encontrado!', 'error');
                btn.disabled = false;
                return;
            }

            showStatus(`Processando ${contracts.length} contratos...`, 'loading');
            
            const grid = document.getElementById('contractsGrid');
            grid.innerHTML = '';
            
            contracts.forEach(contract => {
                grid.appendChild(createContractCard(contract));
            });
            
            document.getElementById('resultsSection').style.display = 'block';
            document.getElementById('emptyState').style.display = 'none';
            
            // Buscar navios sequencialmente
            for (let i = 0; i < contracts.length; i++) {
                const contract = contracts[i];
                updateCardStatus(contract.id, 'searching', 'Buscando...');
                
                try {
                    const response = await fetch(`${BACKEND_URL}/api/ship/${encodeURIComponent(contract.navio)}`);
                    
                    if (response.status === 404) {
                        updateCardStatus(contract.id, 'error', 'Não encontrado');
                        updateCardETA(contract.id, 'Sem sinal AIS', 'O navio pode estar fora de área ou desligado');
                    } else if (response.ok) {
                        const data = await response.json();
                        updateCardWithData(contract.id, data);
                    } else {
                        throw new Error(`HTTP ${response.status}`);
                    }
                } catch (error) {
                    console.error('Erro:', error);
                    updateCardStatus(contract.id, 'error', 'Erro');
                }
                
                // Delay entre requisições
                if (i < contracts.length - 1) {
                    await new Promise(r => setTimeout(r, 1500));
                }
            }
            
            showStatus('Processamento concluído!', 'success');
            btn.disabled = false;
        }

        function createContractCard(contract) {
            const card = document.createElement('div');
            card.className = 'contract-card';
            card.id = `card-${contract.id}`;
            
            card.innerHTML = `
                <div class="contract-header">
                    <span class="contract-number">${contract.id}</span>
                    <span class="status-badge status-waiting" id="status-${contract.id}">Aguardando</span>
                </div>
                
                <div class="ship-name" id="shipname-${contract.id}">⏳ ${contract.navio}</div>
                
                <div class="info-row">
                    <span class="info-label">📄 Booking:</span>
                    <span class="info-value">${contract.booking}</span>
                </div>
                
                <div class="info-row">
                    <span class="info-label">🏢 Armador:</span>
                    <span class="info-value">${contract.armador}</span>
                </div>
                
                <div class="info-row">
                    <span class="info-label">📦 Container:</span>
                    <span class="info-value">${contract.container}</span>
                </div>
                
                <div class="eta-highlight" id="eta-${contract.id}">
                    <div class="eta-label">Status</div>
                    <div class="eta-value" style="font-size: 1.2em;">Aguardando...</div>
                </div>
                
                <div class="debug-info" style="display: none;" id="debug-${contract.id}"></div>
            `;
            
            return card;
        }

        function updateCardStatus(contractId, status, text) {
            const badge = document.getElementById(`status-${contractId}`);
            if (badge) {
                badge.className = `status-badge status-${status}`;
                badge.textContent = text;
            }
        }

        function updateCardETA(contractId, title, subtitle) {
            const etaDiv = document.getElementById(`eta-${contractId}`);
            if (etaDiv) {
                etaDiv.innerHTML = `
                    <div class="eta-label">Status</div>
                    <div class="eta-value" style="font-size: 1.2em;">${title}</div>
                    <div style="font-size: 0.8em; margin-top: 5px; opacity: 0.9;">${subtitle}</div>
                `;
            }
        }

        function updateCardWithData(contractId, shipData) {
            updateCardStatus(contractId, 'found', 'Encontrado');
            
            const shipName = document.getElementById(`shipname-${contractId}`);
            if (shipName) shipName.textContent = '🚢 ' + shipData.name;
            
            const etaDiv = document.getElementById(`eta-${contractId}`);
            if (etaDiv) {
                let etaText = 'Não informado';
                if (shipData.eta && shipData.eta.Month !== 0) {
                    const eta = shipData.eta;
                    etaText = `${eta.Day.toString().padStart(2, '0')}/${eta.Month.toString().padStart(2, '0')} ${eta.Hour.toString().padStart(2, '0')}:${eta.Minute.toString().padStart(2, '0')}`;
                }
                
                etaDiv.innerHTML = `
                    <div class="eta-label">ETA no Destino</div>
                    <div class="eta-value">${etaText}</div>
                    <div style="font-size: 0.8em; margin-top: 5px; opacity: 0.9;">
                        Destino: ${shipData.destination || 'N/A'}
                    </div>
                `;
            }
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status ${type}`;
            
            if (type === 'loading') {
                statusDiv.innerHTML = `<div class="spinner"></div> ${message}`;
            } else {
                statusDiv.textContent = message;
            }
            
            statusDiv.style.display = 'block';
        }

        function clearAll() {
            document.getElementById('dataInput').value = '';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('statusMessage').style.display = 'none';
            contracts = [];
        }

        function loadExample() {
            document.getElementById('dataInput').value = `241ISZ2528034MSCMSDU9826591MSC LUDOVICA
SSZ1738224CMA CGMCGMU5105732SWANSEA
6431520260COSCOOERU4120153INSIGHTS
SZ1750883CMA CGMCGMU5542157CMA CGM LISA MARIE`;
        }
    </script>
</body>
</html>
